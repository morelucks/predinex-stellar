//! # Fee Manager Contract
//!
//! Manages tiered volume-based fee schedules for decentralized exchange pools.
//! An administrator may define up to 5 fee tiers, each with a volume threshold
//! and a fee in basis points. At settlement, the applicable fee is determined by
//! the pool's cumulative volume, falling back to a default flat fee when no tier matches.
//!
//! ## Events
//! - `fee_tiers_updated` – emitted when fee tiers are modified.
//!
//! ## Backward Compatibility
//! When no tiers are configured, the contract operates with the default flat fee,
//! preserving existing behaviour.
//!
//! ## Performance & Security
//! - All inputs are validated before any state mutation.
//! - Maximum 5 tiers ensures constant-time lookup (O(1) scanning).
//! - Authentication enforced via `require_auth()` for all privileged operations.
//! - Logging with appropriate levels for traceability.

#![no_std]

use soroban_sdk::{
    contract, contracterror, contractimpl, contracttype, panic_with_error, Address, Env, String,
    Vec,
};

// ----------------------------------------------------------------------------
// Constants
// ----------------------------------------------------------------------------

/// Maximum basis points (100%).
const MAX_BPS: u32 = 10_000;

/// Maximum number of fee tiers allowed.
const MAX_TIERS: usize = 5;

// ----------------------------------------------------------------------------
// Error types
// ----------------------------------------------------------------------------

/// Contract-specific errors.
#[contracterror]
#[derive(Copy, Clone, Debug, Eq, PartialEq)]
pub enum FeeError {
    /// Only the contract administrator may call this function.
    NotAuthorized = 1,
    /// More than the maximum number of fee tiers were provided.
    TooManyTiers = 2,
    /// Volume thresholds are not strictly increasing.
    TiersNotAscending = 3,
    /// Duplicate volume threshold detected.
    DuplicateThreshold = 4,
    /// Fee exceeds maximum allowed (10 000 bps = 100%).
    FeeTooHigh = 5,
    /// Default fee exceeds maximum allowed.
    DefaultFeeTooHigh = 6,
    /// Contract has already been initialized.
    AlreadyInitialized = 7,
    /// Contract has not been initialized.
    NotInitialized = 8,
    /// Generic invalid configuration (should not happen).
    InvalidConfiguration = 9,
}

// ----------------------------------------------------------------------------
// Data types
// ----------------------------------------------------------------------------

/// A single fee tier: volumes **at or above** the threshold pay this fee.
#[contracttype]
#[derive(Clone, Debug, Eq, PartialEq)]
pub struct FeeTier {
    /// Minimum volume (inclusive) for this tier.
    pub volume_threshold: u128,
    /// Fee in basis points (1 bps = 0.01%).
    pub fee_bps: u32,
}

/// Storage key helpers.
mod keys {
    use soroban_sdk::{Env, Symbol};

    /// Symbol for the administrator address.
    pub fn admin(env: &Env) -> Symbol {
        Symbol::new(env, "ADMIN")
    }

    /// Symbol for the default flat fee.
    pub fn default_fee(env: &Env) -> Symbol {
        Symbol::new(env, "DFLT_FEE")
    }

    /// Symbol for the fee tiers vector.
    pub fn tiers(env: &Env) -> Symbol {
        Symbol::new(env, "TIERS")
    }
}

// ----------------------------------------------------------------------------
// Private helpers
// ----------------------------------------------------------------------------

/// Validates a list of fee tiers according to contract rules.
///
/// # Arguments
/// * `tiers` - The vector of `FeeTier` to validate.
/// * `env` - The contract environment (used for logging).
///
/// # Returns
/// `Ok(())` if all tiers are valid, otherwise `Err(FeeError)` with the specific violation.
fn validate_tiers(tiers: &Vec<FeeTier>, env: &Env) -> Result<(), FeeError> {
    let len = tiers.len();
    if len > MAX_TIERS {
        env.log_str("validate_tiers: Too many tiers");
        return Err(FeeError::TooManyTiers);
    }

    let mut prev_threshold: Option<u128> = None;

    for (index, tier) in tiers.iter().enumerate() {
        // Fee must be ≤ 100%
        if tier.fee_bps > MAX_BPS {
            env.log_str("validate_tiers: Fee exceeds MAX_BPS");
            return Err(FeeError::FeeTooHigh);
        }

        // Thresholds must be strictly increasing
        if let Some(prev) = prev_threshold {
            if tier.volume_threshold < prev {
                env.log_str("validate_tiers: Thresholds not ascending");
                return Err(FeeError::TiersNotAscending);
            }
            if tier.volume_threshold == prev {
                env.log_str("validate_tiers: Duplicate threshold");
                return Err(FeeError::DuplicateThreshold);
            }
        }
        prev_threshold = Some(tier.volume_threshold);
        env.log_str(&format!("validate_tiers: Tier {} valid (threshold={}, fee={})", index, tier.volume_threshold, tier.fee_bps));
    }

    Ok(())
}

// ----------------------------------------------------------------------------
// Contract entry points
// ----------------------------------------------------------------------------

/// Main contract struct.
#[contract]
pub struct FeeManager;

#[contractimpl]
impl FeeManager {
    // -------- Initialization ------------------------------------------------

    /// Initialize the contract with an administrator address and a default flat fee.
    ///
    /// This function may only be called once. It persists the administrator and the default
    /// fee (in basis points) used when no fee tier matches. An empty `fee_tiers_updated`
    /// event is emitted to signal the initial state.
    ///
    /// # Arguments
    /// * `admin` - The address that will be allowed to update fee tiers.
    /// * `default_fee_bps` - The fee in basis points when no tier matches (e.g., 30 = 0.3%).
    ///
    /// # Errors
    /// - `Err(FeeError::AlreadyInitialized)` if the contract is already initialized.
    /// - `Err(FeeError::DefaultFeeTooHigh)` if `default_fee_bps` > `MAX_BPS` (10 000).
    ///
    /// # Events
    /// - `fee_tiers_updated` with an empty tiers vector.
    pub fn initialize(env: Env, admin: Address, default_fee_bps: u32) -> Result<(), FeeError> {
        // One-time initialization guard
        if env.storage().instance().has(&keys::admin(&env)) {
            env.log_str("FeeManager::initialize: Contract already initialized");
            return Err(FeeError::AlreadyInitialized);
        }

        // Validate default fee
        if default_fee_bps > MAX_BPS {
            env.log_str("FeeManager::initialize: Default fee exceeds 100%");
            return Err(FeeError::DefaultFeeTooHigh);
        }

        // Store admin and default fee
        env.storage().instance().set(&keys::admin(&env), &admin);
        env.storage()
            .instance()
            .set(&keys::default_fee(&env), &default_fee_bps);

        // Emit initial state (empty tiers)
        let empty_tiers: Vec<FeeTier> = Vec::new(&env);
        env.events().publish(
            (String::from_str(&env, "fee_tiers_updated"),),
            empty_tiers,
        );

        env.log_str("FeeManager::initialize: Contract initialized successfully");
        env.log_str(&format!("FeeManager::initialize: admin={:?}, default_fee_bps={}", admin, default_fee_bps));

        Ok(())
    }

    // -------- Fee tier management -------------------------------------------

    /// Set the list of volume fee tiers (maximum 5 pairs).
    ///
    /// Each tier must have a strictly increasing `volume_threshold`, no duplicate thresholds,
    /// and `fee_bps` must be ≤ 10 000. The tiers are stored in ascending order; during fee
    /// lookup the first tier with `volume >= threshold` is used.
    ///
    /// # Arguments
    /// * `caller` - The address calling this function (must be the admin).
    /// * `tiers` - A vector of up to 5 `FeeTier` structs.
    ///
    /// # Errors
    /// - `Err(FeeError::NotInitialized)` if the contract has not been initialized.
    /// - `Err(FeeError::NotAuthorized)` if `caller` is not the admin.
    /// - `Err(FeeError::TooManyTiers)` if more than 5 tiers provided.
    /// - `Err(FeeError::TiersNotAscending)` if thresholds not strictly increasing.
    /// - `Err(FeeError::DuplicateThreshold)` if duplicate thresholds found.
    /// - `Err(FeeError::FeeTooHigh)` if any fee exceeds 10 000 bps.
    ///
    /// # Events
    /// - `fee_tiers_updated` with the new tiers.
    pub fn set_volume_fee_tiers(
        env: Env,
        caller: Address,
        tiers: Vec<FeeTier>,
    ) -> Result<(), FeeError> {
        // 1. Fetch admin to ensure initialization
        let admin: Address = match env.storage().instance().get(&keys::admin(&env)) {
            Some(a) => a,
            None => {
                env.log_str("FeeManager::set_volume_fee_tiers: Contract not initialized");
                return Err(FeeError::NotInitialized);
            }
        };

        // 2. Authenticate caller
        caller.require_auth();
        if caller != admin {
            env.log_str("FeeManager::set_volume_fee_tiers: Caller is not admin");
            return Err(FeeError::NotAuthorized);
        }

        // 3. Validate all tiers using helper
        validate_tiers(&tiers, &env)?;

        // 4. Store tiers
        env.storage().instance().set(&keys::tiers(&env), &tiers);

        // 5. Emit event
        env.events().publish(
            (String::from_str(&env, "fee_tiers_updated"),),
            tiers.clone(),
        );

        env.log_str("FeeManager::set_volume_fee_tiers: Tiers updated successfully");
        Ok(())
    }

    // -------- Fee calculation (settlement) ----------------------------------

    /// Calculate the applicable fee for a given volume.
    ///
    /// Iterates over the stored tiers (up to 5) and returns the fee of the first tier
    /// where `volume >= threshold`. If no tier matches, the default flat fee is used.
    ///
    /// # Arguments
    /// * `volume` - The cumulative volume to base the fee on.
    ///
    /// # Returns
    /// The fee in basis points (0..=10_000).
    ///
    /// # Panics
    /// This function panics if the contract has not been initialized (via `panic_with_error`).
    pub fn get_fee(env: Env, volume: u128) -> u32 {
        // Ensure initialization
        if !env.storage().instance().has(&keys::admin(&env)) {
            env.log_str("FeeManager::get_fee: Contract not initialized");
            panic_with_error!(&env, FeeError::NotInitialized);
        }

        let tiers: Vec<FeeTier> = env
            .storage()
            .instance()
            .get(&keys::tiers(&env))
            .unwrap_or(Vec::new(&env));

        // Scan tiers in order (thresholds must be ascending)
        for tier in tiers.iter() {
            if volume >= tier.volume_threshold {
                env.log_str(&format!(
                    "FeeManager::get_fee: Volume {} matched tier (threshold={}, fee={})",
                    volume, tier.volume_threshold, tier.fee_bps
                ));
                return tier.fee_bps;
            }
        }

        // Fallback to default fee
        let default_fee: u32 = env
            .storage()
            .instance()
            .get(&keys::default_fee(&env))
            .expect("Default fee must exist (contract initialized)");
        env.log_str(&format!(
            "FeeManager::get_fee: No tier matched, using default fee: {}",
            default_fee
        ));
        default_fee
    }

    // -------- View / Query functions ----------------------------------------

    /// Return the administrator address.
    pub fn get_admin(env: Env) -> Option<Address> {
        env.storage().instance().get(&keys::admin(&env))
    }

    /// Return the default flat fee (in basis points).
    pub fn get_default_fee(env: Env) -> Option<u32> {
        env.storage().instance().get(&keys::default_fee(&env))
    }

    /// Return the current list of fee tiers.
    pub fn get_tiers(env: Env) -> Vec<FeeTier> {
        env.storage()
            .instance()
            .get(&keys::tiers(&env))
            .unwrap_or(Vec::new(&env))
    }
}